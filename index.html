<!DOCTYPE html>
<html lang="de">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<title>Event Kasse</title>
	<link rel="stylesheet" href="styles.css">
</head>

<body>

<nav>
<button onclick="show('kasse')">Kasse</button>
<button onclick="show('inventar')">Inventar</button>
<button onclick="show('stats')">Statistik</button>
</nav>

<div id="kasse" class="view">

<h2>Kasse</h2>

<div id="items" class="grid"></div>

<div class="cart">

<h3>Bestellung</h3>

<div id="cartList"></div>

<div id="total"></div>

<button class="sellBtn" onclick="sell()">Verkaufen</button>

</div>

</div>

<div id="inventar" class="view">

<h2>Inventar</h2>

<input id="name" placeholder="Name">
<input id="price" type="number" step="0.01" placeholder="Preis">
<input id="stock" type="number" placeholder="Stock">

<button onclick="addItem()">Artikel hinzufügen</button>

<table>

<thead>

<tr>
<th>Name</th>
<th>Preis</th>
<th>Stock</th>
<th>+</th>
<th>-</th>
<th>Aktion</th>
</tr>

</thead>

<tbody id="invTable"></tbody>

</table>

</div>

<div id="stats" class="view">

<h2>Statistik</h2>

<div id="statsContent"></div>

<div style="display: flex; gap: 10px; flex-wrap: wrap;">
    <button id="csvBtn" onclick="exportCSV()" style="margin-top:10px;background:#2196F3;color:white;padding:10px;border:none;border-radius:5px;flex:1;">CSV Export</button>
    <button id="resetBtn" onclick="resetEvent()" style="margin-top:10px;background:#f44336;color:white;padding:10px;border:none;border-radius:5px;flex:1;">Neues Event starten</button>
</div>

</div>

<script src="app.js"></script>

</body>
</html>
