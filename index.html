<!DOCTYPE html>
<html lang="de">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Event Kasse</title>
	<link rel="stylesheet" href="styles.css">
</head>

<body>

<nav>
<button onclick="show('kasse')">Kasse</button>
<button onclick="show('inventar')">Inventar</button>
<button onclick="show('stats')">Statistik</button>
</nav>

<!-- KASSE -->

<div id="kasse" class="view">

<h2>Kasse</h2>

<div id="items" class="grid"></div>

<div class="cart">

<h3>Bestellung</h3>

<div id="cartList"></div>

<div id="total"></div>

<button class="sellBtn" onclick="sell()">Verkaufen</button>

</div>

</div>

<!-- INVENTAR -->

<div id="inventar" class="view">

<h2>Inventar</h2>

<input id="name" placeholder="Name">
<input id="price" type="number" step="0.01" placeholder="Preis">
<input id="stock" type="number" placeholder="Stock">

<button onclick="addItem()">Artikel hinzufügen</button>

<div style="margin-top:15px; border-top:2px solid #ddd; padding-top:10px;">
<button onclick="exportInventory()" style="background:#2196F3;color:white;">📥 Inventar Exportieren</button>
<button onclick="document.getElementById('importFile').click()" style="background:#FF9800;color:white;">📤 Inventar Importieren</button>
<input type="file" id="importFile" accept=".json" style="display:none;" onchange="importInventory()">
</div>

<table>

<thead>

<tr>
<th>Name</th>
<th>Preis</th>
<th>Stock</th>
<th>+</th>
<th>-</th>
<th>Aktion</th>
</tr>

</thead>

<tbody id="invTable"></tbody>

</table>

</div>

<!-- STATISTIK -->

<div id="stats" class="view">

<h2>Statistik</h2>

<div id="passwordPrompt" style="display:none;">
<input type="password" id="statsPassword" placeholder="Passwort eingeben">
<button onclick="checkPassword()">Zugriff</button>
</div>

<div id="statsContent" style="display:none;"></div>

<button id="csvBtn" onclick="exportCSV()" style="display:none;margin-top:10px;background:#2196F3;color:white;padding:10px;border:none;border-radius:5px;">CSV Export</button>

</div>

<script src="app.js"></script>

</body>
</html>
